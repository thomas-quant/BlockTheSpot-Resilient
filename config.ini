;Spotify for Windows (64 bit)
;1.2.88.483
; =========================
; Logging
; 0 Disable
; 1 Information
; 2 Debug
; =========================
[Log]
Level=0
; =========================
; URL block list
; =========================
[URL_block]
Enable=1
1=/ads/
2=/ad-logic/
3=/gabo-receiver-service/
4=/desktop-update/
; =========================
; Libcef options.
; CEF struct offsets are resolved at runtime from libcef.dll's version
; (see cef_offsets.cpp) and no longer need to be set here. You may still add
; CEF_REQUEST_GET_URL_OFFSET / CEF_ZIP_READER_GET_READ_FILE_OFFSET /
; CEF_ZIP_READER_GET_FILE_NAME_OFFSET as a manual override if ever needed.
; =========================
[LIBCEF]
Block_crashpad=1
; =========================
; SPA buffer modify (JS content patches)
; =========================
[Buffer_modify]
Enable=1
1=dwp-leaderboard-component.js
; =========================
; Each file in SPA
; =========================
[dwp-leaderboard-component.js]
1=leaderboard_hide

; Kill the leaderboard ad banner above the playback bar.
; The exported LeaderboardComponent (fn I) guards its render with
;   return!t||a?null:(0,l.jsx)("div",{children:(0,l.jsxs)("div",{...
; Flipping the first operand `!t` -> `!0` makes the guard always truthy, so the
; component always returns null and the banner never renders.
; ?? wildcards absorb the minified 1-char var renames (t,a,l) across releases;
; if the guard structure itself changes, FindPattern simply no-ops (banner shows,
; no crash). Overwrites 1 byte at offset 7 (the `t`), length-preserving.
[leaderboard_hide]
Signature_1=72 65 74 75 72 6E 21 ?? 7C 7C ?? 3F 6E 75 6C 6C 3A 28 30 2C ?? 2E 6A 73 78 29 28 22 64 69 76 22 2C 7B 63 68 69 6C 64 72 65 6E 3A 28 30 2C
Value_1=30
Offset_1=7
